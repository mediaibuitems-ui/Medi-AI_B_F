name: medi_ai
description: "BUITEMS Medi-AI Healthcare & Appointment System - FYP 2025-2026"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management & Navigation
  get: ^4.6.6

  # Networking
  dio: ^5.4.0
  # dio_cache_interceptor: ^3.5.0
  # dio_cache_interceptor_hive_store: ^3.2.2

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2

  # Authentication
  pin_code_fields: ^8.0.1

  # Firebase (temporarily disabled for testing)
  # firebase_core: ^2.24.2
  # firebase_messaging: ^14.7.9

  # UI/UX
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  lottie: ^3.0.0
  flutter_slidable: ^3.0.1
  cached_network_image: ^3.3.1

  # Forms & Validation
  intl: ^0.20.2
  email_validator: ^2.1.17

  # Utilities
  logger: ^2.0.2+1
  connectivity_plus: ^5.0.2
  permission_handler: ^11.2.0
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2

  # Icons
  cupertino_icons: ^1.0.6
  font_awesome_flutter: ^10.6.0
  file_picker: ^11.0.2
  url_launcher: ^6.3.2
  flutter_timezone: ^5.1.0
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/logos/
    - assets/icons/
    - assets/animations/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logos/Medi-AI.png"
  min_sdk_android: 21
  adaptive_icon_background: "#004F8C"
  adaptive_icon_foreground: "assets/images/logos/Medi-AI.png"
